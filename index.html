<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Шанхай 26</title>
<meta name="theme-color" content="#16241a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Шанхай 26">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800;900&family=Golos+Text:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--bg:#f4f6fb;--cream:#fff;--dark:#1c2233;--ink:#1c2233;--muted:#5a6470;--line:#e9ecf3;--free:#2f9e6e;--paid:#e08a2f;--blue:#2f6fe0;--red:#e0472f;--shadow:0 8px 20px rgba(28,34,51,.07);--navh:80px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;font-family:'Golos Text',-apple-system;background:var(--bg);color:var(--ink);padding-bottom:var(--navh);overscroll-behavior-y:contain;}
.app{max-width:560px;margin:0 auto;}
.hero{padding:18px;}
.hero-name{font-family:'Unbounded';font-size:28px;font-weight:800;margin:0;color:var(--dark);}
.sync-badge{display:inline-flex;gap:5px;font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;margin-bottom:8px;background:#e3f0e7;color:var(--free);}
.sync-badge.off{background:#f5ecdd;color:var(--paid);}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
.pill-btn{border-radius:999px;padding:13px 20px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:var(--dark);color:#fff;}
.pill-btn:hover{background:#12172a;}

.screen{display:none;padding:0 18px 24px;}
.screen.active{display:block;}
.search-row{display:flex;gap:10px;margin-bottom:12px;}
.search-pill{flex:1;display:flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:12px 18px;box-shadow:var(--shadow);}
.search-pill input{border:none;outline:none;flex:1;font-size:15px;background:transparent;color:var(--ink);min-width:0;}
.pill-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.pill-select{appearance:none;border:none;border-radius:999px;padding:10px 30px 10px 14px;background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M0 0l5 6 5-6z" fill="%2376806e"/></svg>') no-repeat right 12px center;font-size:13px;font-weight:600;color:var(--ink);box-shadow:var(--shadow);cursor:pointer;}

.count{font-size:12px;color:var(--muted);margin-bottom:12px;font-weight:600;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.card{background:#fff;border-radius:20px;box-shadow:var(--shadow);overflow:hidden;outline:5px solid var(--catcolor);outline-offset:-5px;}
.card:hover{transform:translateY(-2px);transition:transform .15s;}
.card-banner{height:70px;padding:0;background:#fafafa;display:flex;align-items:center;padding:0 12px;}
.banner-tags{display:flex;gap:6px;align-items:center;}
.banner-tag{background:var(--catcolor-soft);color:var(--catcolor);font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;}
.banner-tag.price-free{background:#e6f7ee;color:var(--free);}
.banner-tag.price-paid{background:#fdeae7;color:var(--paid);}

.card-body{padding:14px 16px;}
.card-name{font-weight:700;font-size:16px;line-height:1.4;margin:0 0 10px;}
.card-details{font-size:12.5px;color:var(--muted);margin:0 0 10px;line-height:1.5;}
.card-actions{display:flex;gap:12px;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--line);}
.add-btn{font-size:13px;padding:11px 18px;border-radius:999px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-weight:700;box-shadow:0 6px 14px rgba(47,111,224,.3);}
.add-btn:hover{background:#2559c2;}
.link-a{font-size:11px;color:var(--muted);text-decoration:none;font-weight:600;}

.cn-row{font-size:12px;margin:8px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.cn-label{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;}
.cn-chip{background:#f4f6fb;border:1px solid var(--line);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11.5px;color:var(--ink);font-weight:500;}
.cn-chip:hover{background:var(--catcolor);color:#fff;border-color:var(--catcolor);}

#loginModal{position:fixed;inset:0;background:rgba(22,36,26,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;}
#loginModal.show{display:flex;}
.login-box{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:400px;box-shadow:var(--shadow);}
.login-box h2{margin:0 0 20px;font-size:20px;font-weight:800;color:var(--dark);}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.login-field input{width:100%;padding:11px 13px;border-radius:8px;border:1.5px solid var(--line);font-size:14px;font-family:inherit;}
.login-field input:focus{outline:none;border-color:var(--blue);}
.login-actions{display:flex;gap:10px;margin-top:20px;}
.login-btn{flex:1;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;}
.login-btn.primary{background:var(--blue);color:#fff;}
.login-btn.primary:hover{background:#2559c2;}
.login-btn.secondary{background:var(--line);color:var(--dark);}
.login-error{color:var(--red);font-size:12px;margin-top:10px;text-align:center;}

#addPlaceModal{position:fixed;inset:0;background:rgba(22,36,26,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;overflow-y:auto;}
#addPlaceModal.show{display:flex;}
.add-place-box{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:700px;box-shadow:var(--shadow);margin:auto;}
.add-place-box h2{margin:0 0 20px;font-size:20px;font-weight:800;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row.full{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;}
.form-group label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.form-group input,.form-group textarea{padding:11px 13px;border-radius:8px;border:1.5px solid var(--line);font-size:14px;font-family:inherit;}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);}
.form-group textarea{resize:vertical;min-height:80px;}
.form-error{color:var(--red);font-size:12px;margin-top:10px;}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.form-btn{flex:1;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;}
.form-btn.primary{background:var(--blue);color:#fff;}
.form-btn.primary:hover{background:#2559c2;}
.form-btn.secondary{background:var(--line);color:var(--dark);}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1 class="hero-name">Шанхай 26</h1>
    <span class="sync-badge" id="syncBadge">🔴 локально</span>
    <div class="hero-actions">
      <button class="pill-btn" onclick="openLoginModal()">➕ Добавить место</button>
    </div>
  </div>

  <div class="screen active" id="screen-places">
    <div class="search-row">
      <div class="search-pill">
        <input type="text" id="searchInput" placeholder="Поиск...">
      </div>
    </div>
    <div class="pill-filters">
      <select class="pill-select" id="categoryFilter">
        <option value="">Все категории</option>
      </select>
      <select class="pill-select" id="priceFilter">
        <option value="">Все</option>
        <option value="free">Бесплатно</option>
        <option value="paid">Платно</option>
      </select>
    </div>
    <div class="count" id="cardCount">0 из 0 мест</div>
    <div class="cards" id="cardsContainer"></div>
  </div>
</div>

<!-- Login Modal -->
<div id="loginModal">
  <div class="login-box">
    <h2>Вход</h2>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="loginEmail">
    </div>
    <div class="login-field">
      <label>Пароль</label>
      <input type="password" id="loginPassword">
    </div>
    <div id="loginError" class="login-error"></div>
    <div class="login-actions">
      <button class="login-btn primary" onclick="submitLogin()">Войти</button>
      <button class="login-btn secondary" onclick="closeLoginModal()">Отмена</button>
    </div>
  </div>
</div>

<!-- Add Place Modal -->
<div id="addPlaceModal">
  <div class="add-place-box">
    <h2>Добавить место</h2>
    <div class="form-row">
      <div class="form-group"><label>Название (English) *</label><input type="text" id="placeName"></div>
      <div class="form-group"><label>Название (中文) *</label><input type="text" id="placeCn"></div>
    </div>
    <div class="form-row full">
      <div class="form-group"><label>Сайт (URL) *</label><input type="url" id="placeLink"></div>
    </div>
    <div class="form-row full">
      <div class="form-group"><label>Описание *</label><textarea id="placeDetails"></textarea></div>
    </div>
    <div class="form-row full">
      <div class="form-group"><label>Адрес (中文) *</label><input type="text" id="placeCnAddr"></div>
    </div>
    <div id="formError" class="form-error"></div>
    <div class="form-actions">
      <button class="form-btn primary" onclick="submitPlace()">Добавить</button>
      <button class="form-btn secondary" onclick="closeAddPlaceModal()">Отмена</button>
    </div>
  </div>
</div>

<script>
const ADMIN_EMAIL="ms.kozhakina@gmail.com";const ADMIN_PASSWORD="Anna";const GOOGLE_SCRIPT_URL="https://script.google.com/macros/s/AKfycbyqE12jBB2BAnXWd3aKaWV0Z3I7TdcPxF0405T7PjJ_Li3460xe-yKv-BmOIfzg2vb2RA/exec";
let PLACES=[];let categories=new Set();
function openLoginModal(){document.getElementById("loginModal").classList.add("show");document.getElementById("loginEmail").focus();}
function closeLoginModal(){document.getElementById("loginModal").classList.remove("show");document.getElementById("loginEmail").value="";document.getElementById("loginPassword").value="";document.getElementById("loginError").textContent="";}
function submitLogin(){const e=document.getElementById("loginEmail").value.trim(),s=document.getElementById("loginPassword").value,a=document.getElementById("loginError");if(!e||!s)return void(a.textContent="Заполни оба поля");e===ADMIN_EMAIL&&s===ADMIN_PASSWORD?(closeLoginModal(),openAddPlaceModal()):(a.textContent="Неверный email или пароль",document.getElementById("loginPassword").value="");}
function openAddPlaceModal(){document.getElementById("addPlaceModal").classList.add("show");document.getElementById("placeName").focus();}
function closeAddPlaceModal(){document.getElementById("addPlaceModal").classList.remove("show");["placeName","placeCn","placeLink","placeDetails","placeCnAddr"].forEach(e=>document.getElementById(e).value="");document.getElementById("formError").textContent="";}
function submitPlace(){const e=document.getElementById("placeName").value.trim(),s=document.getElementById("placeCn").value.trim(),a=document.getElementById("placeLink").value.trim(),t=document.getElementById("placeDetails").value.trim(),i=document.getElementById("placeCnAddr").value.trim(),o=document.getElementById("formError");if(!e||!s||!a||!t||!i)return void(o.textContent="Заполни все поля");if(!a.startsWith("http"))return void(o.textContent="Сайт должен начинаться с http:// или https://");const l={name:e,cn:s,link:a,details:t,cn_addr:i};fetch(GOOGLE_SCRIPT_URL,{method:"POST",body:JSON.stringify(l)}).then(e=>e.json()).then(n=>{if(n.success){const c={id:Math.max(...PLACES.map(e=>e.id),0)+1,name:e,category:"",price:"",cn:s,link:a,details:t,cn_addr:i,address:"—",district:"—",status:"актуально"};PLACES.push(c),categories.add(""),refreshFilters(),renderCards(),o.style.color="var(--free)",o.textContent="✓ Добавлено!",setTimeout(closeAddPlaceModal,1500)}}).catch(e=>{o.textContent="Ошибка",console.error(e);});}
function refreshFilters(){document.getElementById("categoryFilter").innerHTML='<option value="">Все категории</option>';[...categories].sort().forEach(e=>{const s=document.createElement("option");s.value=e;s.textContent=e||"Без категории";document.getElementById("categoryFilter").appendChild(s);});}
function renderCards(){const e=document.getElementById("searchInput").value.toLowerCase(),s=document.getElementById("categoryFilter").value,a=document.getElementById("priceFilter").value,t=document.getElementById("cardsContainer");t.innerHTML="";let i=0;PLACES.forEach(o=>{if(s&&o.category!==s)return;if(a==="free"&&!/бесплат/i.test(o.price))return;if(a==="paid"&&!/платно/i.test(o.price))return;if(e&&!(o.name.toLowerCase().includes(e)||o.details.toLowerCase().includes(e)))return;i++;const l=document.createElement("div");l.className="card";l.style.setProperty("--catcolor","#2f6fe0");l.style.setProperty("--catcolor-soft","#eaf0f9");const c=document.createElement("div");c.className="card-banner";const n=document.createElement("div");n.className="banner-tags";const r=document.createElement("span");r.className="banner-tag";r.textContent=o.category||"Место";n.appendChild(r);c.appendChild(n);l.appendChild(c);const d=document.createElement("div");d.className="card-body";const h=document.createElement("h3");h.className="card-name";h.textContent=o.name;d.appendChild(h);const u=document.createElement("p");u.className="card-details";u.textContent=o.details;d.appendChild(u);if(o.cn||o.cn_addr){const e=document.createElement("div");e.className="cn-row";if(o.cn){const s=document.createElement("span");s.className="cn-label";s.textContent="名称 (中文):";e.appendChild(s);const a=document.createElement("span");a.className="cn-chip";a.textContent=o.cn;a.onclick=()=>copyText(o.cn);e.appendChild(a);}d.appendChild(e);}if(o.cn_addr){const e=document.createElement("div");e.className="cn-row";const s=document.createElement("span");s.className="cn-label";s.textContent="地址 (中文):";e.appendChild(s);const a=document.createElement("span");a.className="cn-chip";a.textContent=o.cn_addr;a.onclick=()=>copyText(o.cn_addr);e.appendChild(a);d.appendChild(e);}const m=document.createElement("div");m.className="card-actions";if(o.link){const e=document.createElement("a");e.className="link-a";e.href=o.link;e.target="_blank";e.textContent="[источник →]";m.appendChild(e);}d.appendChild(m);l.appendChild(d);t.appendChild(l);});document.getElementById("cardCount").textContent=i+" из "+PLACES.length+" мест";}
function copyText(e){navigator.clipboard.writeText(e).then(()=>{const e=document.createElement("div");e.style.cssText="position:fixed;top:20px;right:20px;background:var(--free);color:#fff;padding:12px 20px;border-radius:8px;font-size:12px;font-weight:700;z-index:1000";e.textContent="✓ Скопировано";document.body.appendChild(e);setTimeout(()=>e.remove(),2000);});}
document.getElementById("searchInput").addEventListener("input",renderCards);document.getElementById("categoryFilter").addEventListener("change",renderCards);document.getElementById("priceFilter").addEventListener("change",renderCards);
fetch(GOOGLE_SCRIPT_URL+"?action=getPlaces").then(e=>e.json()).then(e=>{if(e.places){PLACES=e.places,categories.clear(),PLACES.forEach(e=>{categories.add(e.category||"")}),refreshFilters(),renderCards()}}).catch(e=>console.log("Offline mode"));renderCards();
</script>
</body>
</html>
